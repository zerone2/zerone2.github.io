<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">

<head>
    <title>Korea Helper</title>

    <link rel="stylesheet" type="text/css" href="css/mainpage.css">

</head>

<body>
    <!-- Wrapper -->
            <div id="wrapper">

                <!-- Header -->
                    <header id="header" class="alt">
                        <a href="index.html" class="logo"><strong>For travel</strong> <span>By 01</span></a>
                        <nav>
                            <a href = "#menu" onclick = "document.getElementById('menu').style.display='block'; document.getElementById('fade').style.display='block'; document.getElementById('header').style.backgroundColor='#000000'; document.getElementsByTagName('body')[0].setAttribute('style','background: #000000')">Menu</a></p>
                        </nav>
                    </header>

            
                <!-- Banner -->
                    <section id="banner" class="major">
                        <div class="inner">
                            <header class="major">
                                <h1>Let's travel Korea</h1>
                            </header>
                            <div class="content">
                                <select id="selBox" style="width: 100%">
                                    <option value=weather>Weather today</option>
                                    <option value=searchPlace>Search the place</option>
                                    <option value=currentLoc>Current place food</option>
                                </select>
                                <ul class="actions">
                                    <li><a href="#menu" id="selectBtn" class="button next scrolly">Go</a></li>
                                </ul>
                            </div>
                        </div>
                    </section>
                    <!-- Menu -->
                    <div class="pop-layer">
                        <nav id="menu" class="popup-layer">
                            <ul class="links">
                                <li><a href="#">Home</a></li>
                                <li><a href="weather.html">Weather</a></li>
                                <li><a href="currentPlace.html">Nearby Restaurants</a></li>
                                <li><a href="searchPlace.html">Search Place</a></li>
                                <li><a href = "javascript:void(0)" onclick = "document.getElementById('menu').style.display='none'; document.getElementById('fade').style.display='none'; document.getElementById('header').style.backgroundColor='#2a2f4a'; document.getElementsByTagName('body')[0].setAttribute('style','background: #2a2f4a'); ">Close</a></li>
                            </ul>
                        </nav>
                        <div id="fade" class="popBg"></div>

                    </div>
            </div>
</body>
