    <script>
        (function() {
            var ready = true;

            document.addEventListener( "DOMContentLoaded", function(){ check(); }, false );

            var check = function(){
                if(ready){
                    dashBoard.clockWidget("Mountain Time", { cssClass: "widget-time" })
                        //.clockWidget("Hometown Time", { cssClass: "widget-time", timeZone: "Mountain" })
                        .dateWidget("Mountain Date", { cssClass: "widget-date" });
                        //.dateWidget("Hometown Date", { cssClass: "widget-date", timeZone: "Mountain" });

                }
                else{
                    setTimeout( check, 10 );
                }
            }
        })();
