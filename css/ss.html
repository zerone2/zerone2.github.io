<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .nation {width:80px; display:inline-block;}
        /*.time p{ display:inline-block; float:left;}*/
    </style>
    <script src="http://code.jquery.com/jquery-1.9.0.min.js"></script>
    <script type="text/javascript">

        $(document).ready(function(){
            $("#utc").html(nowUTC());
            $("#utc2").html(nowUTC2());
            $("#local").html(now());
            $(".time p").each(function(){
                var id =  $(this).attr("id");
                $(this).html(utc_offset($(this)));
            });
        });

        function now(){ return new Date();}
        function nowUTC(){ return new Date(now().getTime() + (now().getTimezoneOffset() * 60000))};
        function nowUTC2(){ return now().toUTCString()};
        function nowUTCoffset(t){ return new Date(nowUTC().getTime() + (t * 60 * 60000))};

        function utc_offset(e){
            var time = e.attr("data-utc-time");
            if(time !="") {
                return "<div class='nation'>" + e.attr("id") + ": </div> " + nowUTCoffset(time) + " ( " + apm( nowUTCoffset(time)) +" )";
            }else return false;
        }

        function apm(eDate){
            var hour = eDate.getHours();
            var min  = eDate.getMinutes();
            var apm = "";

            if (hour >= 12){
                hour = hour- 12;
                apm = "PM";
            }else apm = "AM";

            hour = (hour == 0 )? 12 : hour;
            if(hour < 10) hour = "0" + hour;
            if(min < 10) min = "0" + min;

            return hour+":"+min+" "+apm;
        }

    </script>
</head>
<body>
<div>
    <p id="utc"></p>
    <p id="utc2"></p>
    <p id="local"></p>
</div>
<div class="time">
    <p id="London"	 data-nation="런던"	  data-utc-time="0"></p>
    <p id="Berlin"	 data-nation="베를린" data-utc-time="1"></p>
    <p id="Beijing"	 data-nation="베이징" data-utc-time="8"></p>
    <p id="Korea"	 data-nation="서울"	  data-utc-time="9"></p>
    <p id="Sydney"	 data-nation="시드니" data-utc-time="10" data-utc-summer="9"></p>
    <p id="LA"		 data-nation="LA"	  data-utc-time="-5" data-utc-summer="-4"></p>
    <p id="New York" data-nation="뉴욕"	  data-utc-time="-8" data-utc-summer="-7"></p>
</div>
</body>
</html>
